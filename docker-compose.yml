services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tidebase
      POSTGRES_PASSWORD: tidebase
      POSTGRES_DB: tidebase
    ports:
      - "7432:5432"
    volumes:
      - tidebase-postgres:/var/lib/postgresql/data

  # Prebuilt server image — no Node required:
  #   docker compose --profile server up -d
  server:
    image: ghcr.io/blueprintlabio/tidebase:latest
    profiles: [server]
    environment:
      DATABASE_URL: postgres://tidebase:tidebase@postgres:5432/tidebase
    ports:
      - "7373:7373"
    depends_on:
      - postgres

volumes:
  tidebase-postgres:
